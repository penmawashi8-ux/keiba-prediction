<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競馬予測 — LightGBM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #2563eb;
      --blue-lt: #eff6ff;
      --green:   #16a34a;
      --amber:   #d97706;
      --border:  #e5e7eb;
      --muted:   #6b7280;
      --bg:      #f9fafb;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--bg);
      color: #111;
      min-height: 100vh;
    }

    /* ── ヘッダ ── */
    header {
      background: var(--blue);
      color: #fff;
      padding: 1rem 1.25rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    header p  { font-size: 0.8rem; opacity: 0.85; margin-top: 0.2rem; }

    /* ── メタ情報バー ── */
    #meta-bar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1.25rem;
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }
    #meta-bar .chip {
      background: var(--blue-lt);
      color: var(--blue);
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      padding: 0.15rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 600;
    }
    #meta-bar .badge-count {
      background: var(--green);
      color: #fff;
      border-radius: 999px;
      padding: 0.15rem 0.7rem;
      font-size: 0.78rem;
      font-weight: 700;
    }

    /* ── タブバー ── */
    #tab-bar-wrap {
      background: #fff;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      white-space: nowrap;
      padding: 0 1rem;
    }
    #tab-bar {
      display: inline-flex;
      gap: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--blue); }
    .tab-btn.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }
    .tab-btn .tab-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--amber);
      margin-left: 4px;
      vertical-align: middle;
    }

    /* ── メインコンテンツ ── */
    main {
      max-width: 900px;
      margin: 1.25rem auto;
      padding: 0 1rem;
    }

    /* ── レースカード ── */
    .race-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .race-header {
      background: var(--blue);
      color: #fff;
      padding: 0.65rem 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.5rem;
    }
    .race-header .race-name { font-weight: 700; font-size: 1rem; }
    .race-header .race-meta { font-size: 0.8rem; opacity: 0.85; }

    /* ── 馬テーブル ── */
    .horse-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .horse-table thead th {
      background: #f3f4f6;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.5rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .horse-table tbody td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .horse-table tbody tr:last-child td { border-bottom: none; }
    .horse-table .num { text-align: right; }

    /* ── 推奨 / グレーアウト ── */
    .horse-table tbody tr.recommended td {
      background: #fffbeb;
    }
    .horse-table tbody tr.recommended:hover td {
      background: #fef3c7;
    }
    .horse-table tbody tr.grayed td {
      opacity: 0.45;
    }
    .horse-table tbody tr.grayed:hover td {
      opacity: 0.6;
    }

    /* 推奨バッジ */
    .badge-rec {
      display: inline-block;
      background: var(--amber);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      margin-left: 0.35rem;
      vertical-align: middle;
      letter-spacing: 0.02em;
    }

    /* 予測勝率バー */
    .prob-cell { min-width: 110px; }
    .prob-bar-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .prob-bar-bg {
      flex: 1;
      background: #e5e7eb;
      border-radius: 999px;
      height: 7px;
      overflow: hidden;
    }
    .prob-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 999px;
    }
    .prob-bar-fill.fill-rec { background: var(--amber); }
    .prob-val {
      font-weight: 700;
      color: var(--green);
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .prob-val.val-rec { color: var(--amber); }

    /* 人気バッジ */
    .pop-badge {
      display: inline-block;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      background: #e5e7eb;
      color: #374151;
      font-size: 0.75rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.5rem;
    }
    .pop-badge.pop-1 { background: #fde68a; color: #92400e; }
    .pop-badge.pop-2 { background: #dbeafe; color: #1e40af; }
    .pop-badge.pop-3 { background: #d1fae5; color: #065f46; }

    /* ── ローディング / エラー ── */
    #loading, #error-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    #error-msg { color: #b91c1c; }

    /* ── フッタ ── */
    footer {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      padding: 1.5rem 1rem 2rem;
    }
    footer a { color: var(--blue); text-decoration: none; }

    /* ── スマホ: 馬体重列を非表示 ── */
    @media (max-width: 560px) {
      .col-weight { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>競馬予測</h1>
  <p>LightGBM モデルによる単勝買い目 — 毎週土曜 8:00 JST 自動更新</p>
</header>

<div id="meta-bar">
  <span id="meta-date">読み込み中...</span>
  <span id="meta-filter"></span>
  <span id="meta-count"></span>
</div>

<div id="tab-bar-wrap" style="display:none">
  <div id="tab-bar"></div>
</div>

<main>
  <div id="loading">データを読み込んでいます...</div>
  <div id="error-msg" style="display:none"></div>
  <div id="race-list"></div>
</main>

<footer>
  Powered by LightGBM &amp; GitHub Actions &mdash;
  <a href="https://github.com/penmawashi8-ux/keiba-prediction" target="_blank">GitHub</a>
</footer>

<script>
  // ── 定数 ──
  const REC_PROB = 0.08;
  const REC_ODDS = 20;

  function fmt(v, d) {
    return v == null ? '―' : Number(v).toFixed(d ?? 1);
  }

  function popBadge(pop) {
    if (pop == null) return '―';
    const cls = pop <= 3 ? 'pop-' + pop : '';
    return `<span class="pop-badge ${cls}">${pop}</span>`;
  }

  function probBar(prob, isRec) {
    const fill = Math.min(prob * 100 * 4, 100).toFixed(1);
    const disp = (prob * 100).toFixed(1) + '%';
    const fillCls = isRec ? 'prob-bar-fill fill-rec' : 'prob-bar-fill';
    const valCls  = isRec ? 'prob-val val-rec' : 'prob-val';
    return `<div class="prob-bar-wrap">
      <div class="prob-bar-bg">
        <div class="${fillCls}" style="width:${fill}%"></div>
      </div>
      <span class="${valCls}">${disp}</span>
    </div>`;
  }

  function isRecommended(h) {
    return h.pred_prob >= REC_PROB && h.odds != null && h.odds <= REC_ODDS;
  }

  function buildRaceCard(race) {
    const metaParts = [
      race.venue,
      (race.surface || '') + (race.distance_m ? race.distance_m + 'm' : ''),
      race.condition,
    ].filter(Boolean);

    const rows = race.horses.map(h => {
      const rec = isRecommended(h);
      const trCls = rec ? 'recommended' : 'grayed';
      const badge = rec ? '<span class="badge-rec">推奨</span>' : '';
      return `<tr class="${trCls}">
        <td>${h.horse_num}番</td>
        <td><strong>${h.horse_name}</strong>${badge}</td>
        <td>${h.jockey || '―'}</td>
        <td class="num">${fmt(h.odds)} 倍</td>
        <td class="num">${popBadge(h.popularity)}</td>
        <td class="prob-cell">${probBar(h.pred_prob, rec)}</td>
        <td class="num col-weight" style="color:var(--muted);font-size:.8rem">
          ${h.horse_weight_kg ? h.horse_weight_kg + 'kg' : '―'}
        </td>
      </tr>`;
    }).join('');

    return `<div class="race-card">
      <div class="race-header">
        <span class="race-name">${race.race_name}</span>
        <span class="race-meta">${metaParts.join(' / ')}</span>
      </div>
      <table class="horse-table">
        <thead><tr>
          <th>馬番</th><th>馬名</th><th>騎手</th>
          <th class="num">オッズ</th>
          <th class="num">人気</th>
          <th>予測勝率</th>
          <th class="num col-weight">馬体重</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  // ── タブ切り替え ──
  let raceCards = [];   // {el, hasRec} per race index

  function switchTab(idx) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === idx);
    });
    raceCards.forEach((card, i) => {
      card.el.style.display = i === idx ? '' : 'none';
    });
  }

  async function loadPredictions() {
    const loading    = document.getElementById('loading');
    const errorEl    = document.getElementById('error-msg');
    const raceList   = document.getElementById('race-list');
    const metaDate   = document.getElementById('meta-date');
    const metaFilter = document.getElementById('meta-filter');
    const metaCount  = document.getElementById('meta-count');
    const tabBarWrap = document.getElementById('tab-bar-wrap');
    const tabBar     = document.getElementById('tab-bar');

    try {
      const res = await fetch('predictions/latest.json?_=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      // メタ情報
      const genAt = (data.generated_at || '').replace('T', ' ').slice(0, 16);
      metaDate.textContent = `対象日: ${data.target_date || ''}  (更新: ${genAt} JST)`;

      const fc = data.filter_conditions || {};
      if (fc.min_pred_prob != null) {
        metaFilter.innerHTML =
          `<span class="chip">予測勝率 ≥ ${(fc.min_pred_prob * 100).toFixed(0)}%</span>` +
          `<span class="chip">オッズ ≤ ${fc.max_odds} 倍</span>`;
      }

      metaCount.innerHTML =
        `<span class="badge-count">${data.total_bets ?? 0} 買い目</span>` +
        ` / ${data.total_races ?? 0} レース`;

      loading.style.display = 'none';

      if (data.note) {
        raceList.innerHTML = `<p style="color:var(--muted);padding:1rem">${data.note}</p>`;
        return;
      }
      if (!data.races || !data.races.length) {
        raceList.innerHTML = `<p style="color:var(--muted);padding:1rem">条件に合う買い目がありませんでした。</p>`;
        return;
      }

      // タブ生成
      raceCards = [];
      tabBar.innerHTML = '';
      raceList.innerHTML = '';

      data.races.forEach((race, i) => {
        // カード要素
        const cardWrap = document.createElement('div');
        cardWrap.innerHTML = buildRaceCard(race);
        const cardEl = cardWrap.firstElementChild;
        raceList.appendChild(cardEl);

        // 推奨馬がいるか
        const hasRec = race.horses.some(isRecommended);
        raceCards.push({ el: cardEl, hasRec });

        // タブボタン
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
        btn.textContent = race.race_num + 'R';
        if (hasRec) {
          const dot = document.createElement('span');
          dot.className = 'tab-dot';
          btn.appendChild(dot);
        }
        btn.addEventListener('click', () => switchTab(i));
        tabBar.appendChild(btn);

        // 最初以外は非表示
        if (i !== 0) cardEl.style.display = 'none';
      });

      tabBarWrap.style.display = '';

    } catch (err) {
      loading.style.display = 'none';
      errorEl.style.display = 'block';
      errorEl.textContent = 'データを読み込めませんでした。GitHub Actions が初回実行されると表示されます。';
      console.error(err);
    }
  }

  loadPredictions();
</script>
</body>
</html>
