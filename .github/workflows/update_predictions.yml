name: Update Predictions

on:
  schedule:
    # 毎週土曜 8:00 JST (= 23:00 UTC 金曜)
    - cron: '0 23 * * 5'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python src/scraper/main.py

      - name: Update predictions JSON
        run: python src/model/predict.py

      - name: Commit and push predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/predictions/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update predictions $(date +'%Y-%m-%d')"
            git push
          fi
