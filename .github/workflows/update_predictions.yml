name: Update Predictions

on:
  schedule:
    # 毎週土曜 8:00 JST (= 金曜 23:00 UTC)
    # 前日オッズが確定した朝に実行
    - cron: '0 23 * * 5'
  push:
    branches:
      - 'claude/fix-popularity-bias-BybFi'
    paths:
      - 'src/predict/**'
      - '.github/workflows/update_predictions.yml'
  workflow_dispatch:
    inputs:
      date:
        description: '対象日 YYYYMMDD (省略時: 実行日 JST)'
        required: false
        default: ''
  # collect_data.yml など他ワークフローから呼び出し可能
  workflow_call:
    inputs:
      date:
        description: '対象日 YYYYMMDD (省略時: 実行日 JST)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # モデル (lgbm_model.txt) と stats CSV は src/model/ にコミット済み
      # チェックアウトのみで利用可能 — 追加ダウンロード不要

      - name: Diagnose scraper URLs
        run: |
          DATE="${{ inputs.date || github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(python3 -c "from datetime import datetime,timezone,timedelta; print(datetime.now(timezone(timedelta(hours=9))).strftime('%Y%m%d'))")
          fi
          echo "=== Testing race list URLs for $DATE ===" | tee /tmp/diag_result.txt
          for URL in \
            "https://race.netkeiba.com/top/race_list_sub.html?kaisai_date=${DATE}" \
            "https://race.netkeiba.com/top/race_result_sub.html?kaisai_date=${DATE}" \
            "https://db.netkeiba.com/?pid=race_list&date=${DATE}" \
            "https://race.netkeiba.com/top/race_list.html?kaisai_date=${DATE}"; do
            HTTP=$(curl -s -o /tmp/diag.html -w "%{http_code}" -L "$URL" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
            MATCHES=$(grep -oP 'race_id=\d{12,}' /tmp/diag.html 2>/dev/null | sort -u | wc -l)
            LINE="HTTP $HTTP | race_id_matches: $MATCHES | $URL"
            echo "$LINE" | tee -a /tmp/diag_result.txt
            if [ "$MATCHES" -gt 0 ]; then
              grep -oP 'race_id=\d{12,}' /tmp/diag.html | sort -u | head -5 | tee -a /tmp/diag_result.txt
            fi
          done
          # shutubaページの構造確認
          FIRST_ID=$(grep -oP '\d{12,}' /tmp/diag_result.txt | head -1)
          if [ -n "$FIRST_ID" ]; then
            echo "" >> /tmp/diag_result.txt
            echo "=== Shutuba HTML structure for $FIRST_ID ===" >> /tmp/diag_result.txt
            curl -s "https://race.netkeiba.com/race/shutuba.html?race_id=${FIRST_ID}" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -o /tmp/shutuba.html
            echo "HTTP status: $(curl -s -o /dev/null -w '%{http_code}' 'https://race.netkeiba.com/race/shutuba.html?race_id='${FIRST_ID} -H 'User-Agent: Mozilla/5.0')" >> /tmp/diag_result.txt
            # テーブルのクラス名を探す
            grep -oP '<table[^>]+class="[^"]*"' /tmp/shutuba.html | head -10 >> /tmp/diag_result.txt
            # 馬名パターン
            grep -oP 'HorseName|horsename|Umaban|umaban|Shutuba_Table|ShutubaTb' /tmp/shutuba.html | sort -u >> /tmp/diag_result.txt
            # first 2000 chars
            head -c 2000 /tmp/shutuba.html >> /tmp/diag_result.txt
          fi
          mkdir -p web/predictions
          cp /tmp/diag_result.txt web/predictions/diag.txt

      - name: Test SP shutuba HTML structure (202606020601)
        run: |
          python3 - << 'PYEOF' | tee web/predictions/sp_html_test.txt
          import asyncio, aiohttp, sys, re
          from bs4 import BeautifulSoup

          TEST_RACE_ID = "202606020601"
          SP_URL = f"https://race.sp.netkeiba.com/race/shutuba.html?race_id={TEST_RACE_ID}"
          PC_URL = f"https://race.netkeiba.com/race/shutuba.html?race_id={TEST_RACE_ID}"

          SP_HEADERS = {
              "User-Agent": "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1",
              "Referer": "https://race.sp.netkeiba.com/",
          }
          PC_HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Referer": "https://race.netkeiba.com/",
          }

          async def inspect_shutuba(label, url, headers, encoding="utf-8"):
              print(f"\n{'='*60}")
              print(f"=== {label}: {url} ===")
              async with aiohttp.ClientSession(headers=headers) as session:
                  try:
                      async with session.get(url, timeout=aiohttp.ClientTimeout(total=20)) as resp:
                          print(f"HTTP: {resp.status}")
                          if resp.status != 200:
                              return
                          html = await resp.text(encoding=encoding, errors="replace")
                  except Exception as e:
                      print(f"ERROR: {e}")
                      return

              print(f"HTML length: {len(html)}")
              soup = BeautifulSoup(html, "lxml")

              # テーブル一覧
              print("\n--- Tables ---")
              for t in soup.find_all("table"):
                  cls = t.get("class", [])
                  tid = t.get("id", "")
                  rows = len(t.find_all("tr"))
                  print(f"  table class={cls} id={tid} rows={rows}")

              # 最初のテーブルの全行・セル構造
              tables = soup.find_all("table")
              for ti, table in enumerate(tables):
                  rows = table.find_all("tr")
                  if len(rows) < 3:
                      continue
                  print(f"\n--- Table[{ti}] class={table.get('class',[])} - First data row cell structure ---")
                  for row in rows:
                      cells = row.find_all("td")
                      if len(cells) >= 5:
                          for ci, td in enumerate(cells):
                              cls = td.get("class", [])
                              txt = td.get_text(strip=True)[:40]
                              a_hrefs = [a.get("href","")[:50] for a in td.find_all("a")]
                              sel_ids = [s.get("id","") for s in td.find_all("select")]
                              print(f"    [{ci}] class={cls} text={repr(txt)} a_hrefs={a_hrefs} selects={sel_ids}")
                          break
                  break

              # 馬番・馬名・オッズ・人気クラスを検索
              print("\n--- Key class patterns ---")
              for pat in ["Num", "Horse", "Jockey", "Odds", "Popular", "Ninki", "Shutuba",
                          "umaban", "horsename", "popular", "odds", "ninki", "mark_"]:
                  found = soup.find_all(class_=re.compile(pat, re.I))
                  if found:
                      sample = found[0].get_text(strip=True)[:30]
                      print(f"  .{pat}: {len(found)}個 sample={repr(sample)}")

              # mark_X select を探す
              selects = soup.find_all("select", id=re.compile(r"mark_"))
              print(f"\n--- select[id^=mark_]: {len(selects)}個 ---")
              for s in selects[:3]:
                  print(f"  id={s.get('id')}")

              # body先頭2000文字
              body = soup.find("body")
              if body:
                  print(f"\n--- Body HTML (first 2000 chars) ---")
                  print(str(body)[:2000])

          async def main():
              # SP版 (EUC-JP)
              await inspect_shutuba("SP版", SP_URL, SP_HEADERS, encoding="euc_jp")
              await asyncio.sleep(1)
              # PC版 (EUC-JP)
              await inspect_shutuba("PC版", PC_URL, PC_HEADERS, encoding="euc_jp")

          asyncio.run(main())
          PYEOF

      - name: Test odds JSON API (known race_id)
        run: |
          python3 - << 'PYEOF' | tee web/predictions/odds_api_test.txt
          import asyncio, aiohttp, json, sys, logging
          logging.basicConfig(level=logging.INFO, stream=sys.stdout,
                              format='%(asctime)s [%(levelname)s] %(message)s')
          sys.path.insert(0, '.')
          from src.predict.scrape_entries import _fetch_odds_json, _fetch_odds_html, HEADERS
          import aiohttp as _aio

          # 2026-03-15 中山1R (確実に存在するrace_id)
          TEST_RACE_ID = "202606020601"

          async def main():
              async with _aio.ClientSession(headers=HEADERS) as session:
                  print(f"=== JSON API テスト: {TEST_RACE_ID} ===")
                  # 生レスポンスを直接確認
                  url = f"https://race.netkeiba.com/api/api_get_jra_odds.html?race_id={TEST_RACE_ID}&type=1&action=update"
                  try:
                      async with session.get(url, timeout=_aio.ClientTimeout(total=20)) as resp:
                          print(f"HTTP status: {resp.status}")
                          print(f"Content-Type: {resp.headers.get('Content-Type', 'unknown')}")
                          text = await resp.text(encoding="utf-8", errors="replace")
                          print(f"Response length: {len(text)}")
                          print(f"Response (first 500 chars):\n{text[:500]}")
                  except Exception as e:
                      print(f"ERROR: {e}")
                      return

                  result = await _fetch_odds_json(session, TEST_RACE_ID)
                  if result:
                      print(f"\nSUCCESS: {len(result)}頭分のオッズ取得")
                      for num, (odds, pop) in sorted(result.items()):
                          print(f"  馬番{num}: odds={odds}, 人気={pop}")
                  else:
                      print("\nFAIL: JSON APIからオッズ取得できず → HTML fallbackを試す")
                      result2 = await _fetch_odds_html(session, TEST_RACE_ID)
                      if result2:
                          print(f"HTML fallback SUCCESS: {len(result2)}頭分")
                          for num, (odds, pop) in sorted(result2.items()):
                              print(f"  馬番{num}: odds={odds}, 人気={pop}")
                      else:
                          print("HTML fallback FAIL")

          asyncio.run(main())
          PYEOF

      - name: Test scraper parsing
        run: |
          DATE="${{ inputs.date || github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(python3 -c "from datetime import datetime,timezone,timedelta; print(datetime.now(timezone(timedelta(hours=9))).strftime('%Y%m%d'))")
          fi
          cat > /tmp/test_scraper.py << PYEOF
          import asyncio, aiohttp, sys, logging, re
          logging.basicConfig(level=logging.WARNING, stream=sys.stdout)
          sys.path.insert(0, '.')
          from src.predict.scrape_entries import fetch_race_ids, HEADERS
          from bs4 import BeautifulSoup
          DATE_ARG = sys.argv[1]
          async def main():
              async with aiohttp.ClientSession(headers=HEADERS) as session:
                  ids = await fetch_race_ids(session, DATE_ARG)
                  print(f'=== race_ids ({len(ids)}) ===')
                  for i in ids[:5]:
                      print(' ', i)
                  if not ids:
                      return
                  rid = ids[0]
                  # Fetch shutuba directly and inspect HTML
                  url = f'https://race.netkeiba.com/race/shutuba.html?race_id={rid}'
                  async with session.get(url, timeout=aiohttp.ClientTimeout(total=20)) as resp:
                      print(f'shutuba HTTP: {resp.status}')
                      html = await resp.text(encoding='euc_jp', errors='replace')
                  soup = BeautifulSoup(html, 'lxml')
                  table = soup.find('table', class_=re.compile(r'Shutuba|shutuba|RaceTable', re.I))
                  print(f'table found: {table is not None}')
                  if table:
                      rows = table.find_all('tr')
                      print(f'rows: {len(rows)}')
                      # Show all cells for first data row
                  for row in rows:
                          cells = row.find_all('td')
                          if len(cells) < 10:
                              continue
                          for i, td in enumerate(cells):
                              cls = td.get('class', [])
                              txt = td.get_text(strip=True)[:30]
                              inner = str(td)[:100].replace('\n',' ')
                              print(f'  [{i}] class={cls} text={repr(txt)}')
                          break  # only first data row
          asyncio.run(main())
          PYEOF
          python3 /tmp/test_scraper.py "$DATE" > web/predictions/parse_test.txt 2>&1

      - name: Run prediction
        continue-on-error: true
        run: |
          # workflow_dispatch と workflow_call の両方で date を取得
          DATE="${{ inputs.date || github.event.inputs.date }}"
          # push trigger では DATE が空になるので直近の土曜 (2026-03-15) を使用
          if [ -z "$DATE" ] && [ "${{ github.event_name }}" = "push" ]; then
            DATE="20260315"
          fi
          DATE_ARG=""
          if [ -n "$DATE" ]; then
            DATE_ARG="--date $DATE"
          fi
          python src/predict/predict_today.py $DATE_ARG 2>&1 | tee web/predictions/run_log.txt
          EXIT_CODE=${PIPESTATUS[0]}
          exit $EXIT_CODE

      - name: Show result summary
        continue-on-error: true
        run: |
          python - <<'EOF'
          import json, pathlib
          p = pathlib.Path("web/predictions/latest.json")
          if not p.exists():
              print("latest.json not found")
              exit(0)
          d = json.loads(p.read_text())
          print(f"target_date : {d.get('target_date')}")
          print(f"total_bets  : {d.get('total_bets')}")
          print(f"total_races : {d.get('total_races')}")
          for race in d.get("races", []):
              for h in race.get("horses", []):
                  print(f"  {race['venue']} {race['race_name']} "
                        f"{h['horse_num']}番 {h['horse_name']} "
                        f"odds={h['odds']} pred={h['pred_prob']:.3f}")
          EOF

      - name: Commit and push predictions
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET=$(python3 -c "
          import json, pathlib
          p = pathlib.Path('web/predictions/latest.json')
          d = json.loads(p.read_text()) if p.exists() else {}
          print(d.get('target_date', 'unknown'))
          " 2>/dev/null || echo "unknown")
          echo "Target date: $TARGET"

          commit_file() {
            local fpath="$1"
            [ -f "$fpath" ] || return 0
            SHA=$(gh api "repos/$GITHUB_REPOSITORY/contents/$fpath?ref=$GITHUB_REF_NAME" \
              --jq .sha 2>/dev/null || echo "")
            if [ -n "$SHA" ]; then
              gh api "repos/$GITHUB_REPOSITORY/contents/$fpath" \
                --method PUT \
                -f message="chore: update predictions $TARGET" \
                -f content="$(base64 -w0 "$fpath")" \
                -f branch="$GITHUB_REF_NAME" \
                -f sha="$SHA" \
                --silent && echo "  updated: $fpath" || echo "  failed: $fpath"
            else
              gh api "repos/$GITHUB_REPOSITORY/contents/$fpath" \
                --method PUT \
                -f message="chore: update predictions $TARGET" \
                -f content="$(base64 -w0 "$fpath")" \
                -f branch="$GITHUB_REF_NAME" \
                --silent && echo "  created: $fpath" || echo "  failed: $fpath"
            fi
          }

          commit_file web/predictions/latest.json
          commit_file web/predictions/run_log.txt
          commit_file web/predictions/diag.txt
          commit_file web/predictions/parse_test.txt
          commit_file web/predictions/odds_api_test.txt
          commit_file web/predictions/sp_html_test.txt
