name: Update Predictions

on:
  schedule:
    # 毎週土曜 8:00 JST (= 金曜 23:00 UTC)
    # 前日オッズが確定した朝に実行
    - cron: '0 23 * * 5'
  workflow_dispatch:
    inputs:
      date:
        description: '対象日 YYYYMMDD (省略時: 実行日 JST)'
        required: false
        default: ''
  # collect_data.yml など他ワークフローから呼び出し可能
  workflow_call:
    inputs:
      date:
        description: '対象日 YYYYMMDD (省略時: 実行日 JST)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # モデル (lgbm_model.txt) と stats CSV は src/model/ にコミット済み
      # チェックアウトのみで利用可能 — 追加ダウンロード不要

      - name: Diagnose scraper URLs
        run: |
          DATE="${{ inputs.date || github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(python3 -c "from datetime import datetime,timezone,timedelta; print(datetime.now(timezone(timedelta(hours=9))).strftime('%Y%m%d'))")
          fi
          echo "=== Testing race list URLs for $DATE ===" | tee /tmp/diag_result.txt
          for URL in \
            "https://race.netkeiba.com/top/race_list_sub.html?kaisai_date=${DATE}" \
            "https://race.netkeiba.com/top/race_result_sub.html?kaisai_date=${DATE}" \
            "https://db.netkeiba.com/?pid=race_list&date=${DATE}" \
            "https://race.netkeiba.com/top/race_list.html?kaisai_date=${DATE}"; do
            HTTP=$(curl -s -o /tmp/diag.html -w "%{http_code}" -L "$URL" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
            MATCHES=$(grep -oP 'race_id=\d{12,}' /tmp/diag.html 2>/dev/null | sort -u | wc -l)
            LINE="HTTP $HTTP | race_id_matches: $MATCHES | $URL"
            echo "$LINE" | tee -a /tmp/diag_result.txt
            if [ "$MATCHES" -gt 0 ]; then
              grep -oP 'race_id=\d{12,}' /tmp/diag.html | sort -u | head -5 | tee -a /tmp/diag_result.txt
            fi
          done
          # shutubaページの構造確認
          FIRST_ID=$(grep -oP '\d{12,}' /tmp/diag_result.txt | head -1)
          if [ -n "$FIRST_ID" ]; then
            echo "" >> /tmp/diag_result.txt
            echo "=== Shutuba HTML structure for $FIRST_ID ===" >> /tmp/diag_result.txt
            curl -s "https://race.netkeiba.com/race/shutuba.html?race_id=${FIRST_ID}" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -o /tmp/shutuba.html
            echo "HTTP status: $(curl -s -o /dev/null -w '%{http_code}' 'https://race.netkeiba.com/race/shutuba.html?race_id='${FIRST_ID} -H 'User-Agent: Mozilla/5.0')" >> /tmp/diag_result.txt
            # テーブルのクラス名を探す
            grep -oP '<table[^>]+class="[^"]*"' /tmp/shutuba.html | head -10 >> /tmp/diag_result.txt
            # 馬名パターン
            grep -oP 'HorseName|horsename|Umaban|umaban|Shutuba_Table|ShutubaTb' /tmp/shutuba.html | sort -u >> /tmp/diag_result.txt
            # first 2000 chars
            head -c 2000 /tmp/shutuba.html >> /tmp/diag_result.txt
          fi
          mkdir -p web/predictions
          cp /tmp/diag_result.txt web/predictions/diag.txt

      - name: Test scraper parsing
        run: |
          DATE="${{ inputs.date || github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(python3 -c "from datetime import datetime,timezone,timedelta; print(datetime.now(timezone(timedelta(hours=9))).strftime('%Y%m%d'))")
          fi
          cat > /tmp/test_scraper.py << PYEOF
          import asyncio, aiohttp, sys, logging, re
          logging.basicConfig(level=logging.WARNING, stream=sys.stdout)
          sys.path.insert(0, '.')
          from src.predict.scrape_entries import fetch_race_ids, HEADERS
          from bs4 import BeautifulSoup
          DATE_ARG = sys.argv[1]
          async def main():
              async with aiohttp.ClientSession(headers=HEADERS) as session:
                  ids = await fetch_race_ids(session, DATE_ARG)
                  print(f'=== race_ids ({len(ids)}) ===')
                  for i in ids[:5]:
                      print(' ', i)
                  if not ids:
                      return
                  rid = ids[0]
                  # Fetch shutuba directly and inspect HTML
                  url = f'https://race.netkeiba.com/race/shutuba.html?race_id={rid}'
                  async with session.get(url, timeout=aiohttp.ClientTimeout(total=20)) as resp:
                      print(f'shutuba HTTP: {resp.status}')
                      html = await resp.text(encoding='euc_jp', errors='replace')
                  soup = BeautifulSoup(html, 'lxml')
                  table = soup.find('table', class_=re.compile(r'Shutuba|shutuba|RaceTable', re.I))
                  print(f'table found: {table is not None}')
                  if table:
                      rows = table.find_all('tr')
                      print(f'rows: {len(rows)}')
                      for row in rows[:5]:
                          cells = row.find_all('td')
                          print(f'  cells: {len(cells)}')
                          if len(cells) == 0:
                              continue
                          # Show first few td classes and content
                          for td in cells[:6]:
                              cls = td.get('class', [])
                              txt = td.get_text(strip=True)[:20]
                              inner = str(td)[:80].replace('\n','')
                              print(f'    td class={cls} text={repr(txt)} inner={repr(inner)}')
          asyncio.run(main())
          PYEOF
          python3 /tmp/test_scraper.py "$DATE" > web/predictions/parse_test.txt 2>&1

      - name: Run prediction
        run: |
          # workflow_dispatch と workflow_call の両方で date を取得
          DATE="${{ inputs.date || github.event.inputs.date }}"
          DATE_ARG=""
          if [ -n "$DATE" ]; then
            DATE_ARG="--date $DATE"
          fi
          python src/predict/predict_today.py $DATE_ARG

      - name: Show result summary
        run: |
          python - <<'EOF'
          import json, pathlib
          p = pathlib.Path("web/predictions/latest.json")
          if not p.exists():
              print("latest.json not found")
              exit(0)
          d = json.loads(p.read_text())
          print(f"target_date : {d.get('target_date')}")
          print(f"total_bets  : {d.get('total_bets')}")
          print(f"total_races : {d.get('total_races')}")
          for race in d.get("races", []):
              for h in race.get("horses", []):
                  print(f"  {race['venue']} {race['race_name']} "
                        f"{h['horse_num']}番 {h['horse_name']} "
                        f"odds={h['odds']} pred={h['pred_prob']:.3f}")
          EOF

      - name: Commit and push predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/predictions/latest.json web/predictions/diag.txt web/predictions/parse_test.txt 2>/dev/null || git add web/predictions/latest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TARGET=$(python -c "
          import json, pathlib
          d = json.loads(pathlib.Path('web/predictions/latest.json').read_text())
          print(d.get('target_date', 'unknown'))
            ")
            git commit -m "chore: update predictions ${TARGET}"
            git push
          fi
