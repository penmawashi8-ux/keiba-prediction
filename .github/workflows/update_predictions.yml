name: Update Predictions

on:
  schedule:
    # 毎週土曜 8:00 JST (= 金曜 23:00 UTC)
    # 前日オッズが確定した朝に実行
    - cron: '0 23 * * 5'
  workflow_dispatch:
    inputs:
      date:
        description: '対象日 YYYYMMDD (省略時: 今日 JST) ※レースは土日のみ'
        required: false
        default: ''
      debug:
        description: 'デバッグモード: true にするとスクレイパーの詳細ログを表示'
        required: false
        default: 'false'
  # collect_data.yml など他ワークフローから呼び出し可能
  workflow_call:
    inputs:
      date:
        description: '対象日 YYYYMMDD (省略時: 実行日 JST)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # モデル (lgbm_model.txt) と stats CSV は src/model/ にコミット済み
      # チェックアウトのみで利用可能 — 追加ダウンロード不要

      - name: Check date and netkeiba connectivity
        run: |
          DATE="${{ inputs.date || github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(python3 -c "from datetime import datetime,timezone,timedelta; print(datetime.now(timezone(timedelta(hours=9))).strftime('%Y%m%d'))")
          fi
          echo "=== Target date: $DATE ==="
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          URL="https://race.netkeiba.com/top/race_list_sub.html?kaisai_date=${DATE}"
          STATUS=$(curl -s -o /tmp/netkeiba_resp.html -w "%{http_code}" -A "$UA" -H "Referer: https://race.netkeiba.com/" --max-time 15 "$URL" 2>/dev/null || echo "000")
          HTML_LEN=$(wc -c < /tmp/netkeiba_resp.html 2>/dev/null || echo 0)
          RACE_COUNT=0
          if [ "$STATUS" = "200" ]; then
            RACE_COUNT=$(grep -oP 'race_id=\d{12,}' /tmp/netkeiba_resp.html 2>/dev/null | sort -u | wc -l || echo 0)
          fi
          HTML_PREVIEW=$(head -c 200 /tmp/netkeiba_resp.html 2>/dev/null | tr -d '\n\r' || echo "")
          echo "HTTP status : $STATUS"
          echo "HTML length : $HTML_LEN bytes"
          echo "Race IDs    : $RACE_COUNT"
          echo "HTML preview: $HTML_PREVIEW"
          # Also test one shutuba page
          FIRST_RACE_ID=$(grep -oP 'race_id=\d{12,}' /tmp/netkeiba_resp.html 2>/dev/null | head -1 | grep -oP '\d{12,}' || echo "")
          SHUTUBA_STATUS="N/A"
          SHUTUBA_LEN=0
          SHUTUBA_TABLE="no"
          if [ -n "$FIRST_RACE_ID" ]; then
            SHUTUBA_STATUS=$(curl -s -o /tmp/shutuba_resp.html -w "%{http_code}" -A "$UA" -H "Referer: https://race.netkeiba.com/" --max-time 15 "https://race.netkeiba.com/race/shutuba.html?race_id=${FIRST_RACE_ID}" 2>/dev/null || echo "000")
            SHUTUBA_LEN=$(wc -c < /tmp/shutuba_resp.html 2>/dev/null || echo 0)
            SHUTUBA_TABLE=$(grep -oi 'ShutubaTabe\|shutuba_table\|ShutubaTable\|RaceTableName\|Shutuba\|HorseName\|RaceTable01' /tmp/shutuba_resp.html 2>/dev/null | head -3 | tr '\n' ',' || echo "none")
          fi
          # Commit diagnostic JSON so we can read it via API
          printf '{"date":"%s","race_list_status":"%s","race_list_bytes":%s,"race_ids_found":%s,"first_race_id":"%s","shutuba_status":"%s","shutuba_bytes":%s,"shutuba_classes":"%s"}\n' \
            "$DATE" "$STATUS" "$HTML_LEN" "$RACE_COUNT" "$FIRST_RACE_ID" "$SHUTUBA_STATUS" "$SHUTUBA_LEN" "$SHUTUBA_TABLE" \
            > web/predictions/debug.json

      - name: Run prediction
        run: |
          # workflow_dispatch と workflow_call の両方で date を取得
          DATE="${{ inputs.date || github.event.inputs.date }}"
          DATE_ARG=""
          if [ -n "$DATE" ]; then
            DATE_ARG="--date $DATE"
          fi
          python src/predict/predict_today.py $DATE_ARG

      - name: Show result summary
        run: |
          python - <<'EOF'
          import json, pathlib
          p = pathlib.Path("web/predictions/latest.json")
          if not p.exists():
              print("latest.json not found")
              exit(0)
          d = json.loads(p.read_text())
          print(f"target_date : {d.get('target_date')}")
          print(f"generated_at: {d.get('generated_at')}")
          print(f"total_bets  : {d.get('total_bets')}")
          print(f"total_races : {d.get('total_races')}")
          if d.get('note'):
              print(f"note        : {d.get('note')}")
          for race in d.get("races", []):
              print(f"  [{race['venue']}] {race['race_name']} ({len(race.get('horses',[]))}頭)")
              for h in race.get("horses", []):
                  print(f"    {h['horse_num']}番 {h['horse_name']} "
                        f"odds={h['odds']} pred={h['pred_prob']:.3f}")
          EOF

      - name: Commit and push predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/predictions/latest.json web/predictions/debug.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TARGET=$(python -c "
          import json, pathlib
          d = json.loads(pathlib.Path('web/predictions/latest.json').read_text())
          print(d.get('target_date', 'unknown'))
            ")
            git commit -m "chore: update predictions ${TARGET}"
            git push
          fi
