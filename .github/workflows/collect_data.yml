name: Collect Race Data

on:
  workflow_dispatch:
    inputs:
      years:
        description: '対象年 (カンマ区切り or "2015-2024" 範囲指定)'
        required: true
        default: '2015-2024'
      venue:
        description: '競馬場コード (空白=全場, 例: 05=東京)'
        required: false
        default: ''
      workers:
        description: '並列ワーカー数 (デフォルト: 10)'
        required: false
        default: '10'
      run_predictions:
        description: '収集後に当日の予測も実行する (true / false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  # 入力された年をMatrix用のJSON配列に変換
  setup:
    runs-on: ubuntu-latest
    outputs:
      year_matrix: ${{ steps.parse.outputs.year_matrix }}
    steps:
      - name: Parse years input
        id: parse
        run: |
          INPUT="${{ github.event.inputs.years }}"
          # "2015-2024" 形式の範囲を展開
          if echo "$INPUT" | grep -qE '^[0-9]{4}-[0-9]{4}$'; then
            START=$(echo "$INPUT" | cut -d'-' -f1)
            END=$(echo "$INPUT" | cut -d'-' -f2)
            YEARS=$(seq "$START" "$END" | tr '\n' ',' | sed 's/,$//')
          else
            YEARS="$INPUT"
          fi
          # カンマ区切り → JSON配列
          JSON=$(echo "$YEARS" | tr ',' '\n' | jq -R . | jq -sc .)
          echo "year_matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "Parsed years: $JSON"

  collect:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 1年分は並列10ワーカーで約30分
    strategy:
      matrix:
        year: ${{ fromJson(needs.setup.outputs.year_matrix) }}
      max-parallel: 10   # 10年分を同時実行
      fail-fast: false   # 1年失敗しても他は継続

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          VENUE_ARG=""
          if [ -n "${{ github.event.inputs.venue }}" ]; then
            VENUE_ARG="--venue ${{ github.event.inputs.venue }}"
          fi
          python src/scraper/collect.py \
            --year ${{ matrix.year }} \
            $VENUE_ARG \
            --workers ${{ github.event.inputs.workers }}

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: race-data-${{ matrix.year }}
          path: data/raw/${{ matrix.year }}_races.csv
          retention-days: 90

  # 全年のCSVをまとめてコミット
  commit:
    needs: collect
    runs-on: ubuntu-latest
    if: always()  # 一部失敗しても収集できた分はコミット

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: race-data-*
          path: data/raw/
          merge-multiple: true

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: collect race results (${{ github.event.inputs.years }})"
            git push
          fi

  # run_predictions=true のとき、収集完了後に予測ワークフローを呼び出す
  run-predictions:
    needs: commit
    if: ${{ github.event.inputs.run_predictions == 'true' }}
    uses: ./.github/workflows/update_predictions.yml
    secrets: inherit
